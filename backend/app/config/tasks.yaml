route_query_task:
  description: >
    Review the user's input: '{user_input}'.
    Determine the primary intent. You MUST classify the intent into ONE of the following categories:
    1. 'greeting': A simple greeting or general chat.
    2. 'disease': The user is asking about a plant disease or providing an image for diagnosis.
    3. 'weather': The user is asking about weather conditions.
    4. 'market': The user is asking about crop prices, market rates, or where to sell.
    5. 'diary': The user is logging an expense, income, or harvest yield.
    6. 'alerts': The user is asking for their daily tip, pest risk, or current alerts.
    7. 'agronomy': The user is asking general farming advice (fertilizers, soil, crop timing) or anything else.
    8. 'soil': The user is asking to analyze soil images or interpret physical DIY soil tests.
    9. 'water': The user is asking for irrigation advice, soil moisture status, or water-related alerts (flood/drought).
    10. 'finance': The user is asking about government subsidies, how to apply for a Krishi Card, crop insurance, or their credit readiness score.
    11. 'community': The user is asking a question to the community, wants to see if others had this issue, or wants expert escalation.
    12. 'marketplace': The user wants to buy seeds/fertilizers, find a dealer, or verify a product barcode/label.
    13. 'emergency': The user is reporting disaster damage (flood, cyclone), filing an insurance claim, or wants to call a helpline.
  expected_output: >
    You must return a raw JSON object with NO markdown formatting, NO backticks, and NO conversational text.
    The JSON must contain two keys: 'intent' (the category string) and 'router_response' (your immediate polite answer or greeting in the user's language).
    Example: {{"intent": "greeting", "router_response": "Hello, how can I help?"}}

disease_diagnosis_task:
  description: >
    The user has uploaded an image of a crop at the path: '{image_path}'.
    Use your vision tools to analyze the image. Consider the user's input: '{user_input}'.
    Identify the disease and recommend a treatment plan.
  expected_output: >
    A detailed diagnosis and actionable treatment plan in the user's language.

agronomy_advice_task:
  description: >
    Provide general farming advice for the user's query: '{user_input}'.
    Consider any provided weather data or location: '{gps}'.
  expected_output: >
    Clear, step-by-step farming advice.

weather_advice_task:
  description: >
    Analyze the weather for the user's location: '{gps}'.
    Consider the user's query: '{user_input}'.
  expected_output: >
    Provide actionable weather advice for farming in the user's language.

market_advice_task:
  description: >
    Provide market intelligence for the user's query: '{user_input}'.
    Extract the crop mentioned and use your market tools to find current prices and trends.
    Format your response in the user's language, emphasizing whether they should hold or sell.
  expected_output: >
    A clear summary of market prices, predictions, and selling advice.

farm_diary_task:
  description: >
    Analyze the user's input: '{user_input}'.
    If they are logging a transaction (e.g., spent 500 BDT on fertilizer), extract the details into a strict JSON format.
    The JSON must contain:
    - 'entry_type' (must be one of: 'expense', 'income', 'yield')
    - 'amount' (number)
    - 'category' (string, e.g., 'fertilizer', 'labor', 'sales')
    - 'unit' (string, e.g., 'BDT', 'kg')
    - 'notes' (string, a brief summary in English)
    
    If they are asking for a report, summarize their data.
  expected_output: >
    Return ONLY a raw JSON object containing the extracted fields. Do not include markdown ticks.

alert_advice_task:
  description: >
    Review the user's input: '{user_input}' and their location/weather data: '{gps}'.
    Extract the crop they are asking about. Use your pest risk tool to determine if there are any immediate dangers based on the weather.
    Format your response in the user's language, providing a clear color-coded risk (Green/Yellow/Red) and actionable advice.
  expected_output: >
    A clear summary of pest/disease risks and a daily tip.

soil_analysis_task:
  description: >
    The user wants an analysis of their soil condition.
    If an image path is provided, use the Soil Image Analyzer to determine the likely texture and organic matter content.
    If the user describes a DIY test (like ribbon length or pH color), use the DIY Soil Test Interpreter to decode it.
    Based on the findings, formulate a precise, actionable fertilizer and soil amendment plan for their crop.
    User input: "{user_input}"
    Image provided: "{image_path}"
  expected_output: >
    A clear Bengali explanation of the soil condition (texture/pH) followed by a bulleted list of recommended organic amendments and fertilizers (e.g., compost, lime, NPK).
  agent: soil_scientist_agent

irrigation_advice_task:
  description: >
    Provide precision irrigation advice and water hazard alerts for the user's location: '{gps}'.
    Use your satellite moisture tools to check the current root-zone soil wetness.
    Combine this with weather forecast data (rain chance, precipitation) to calculate a water balance.
    If there are high rainfall forecasts, check for flood risks.
    Format your response in actionable Bengali.
  expected_output: >
    A clear Bengali status report (e.g., "মাটির আর্দ্রতা বর্তমানে সন্তোষজনক") followed by specific irrigation advice (e.g., "আগামী ২৪ ঘণ্টার মধ্যে ১৫ মি.মি. সেচ দিন") and any relevant alerts.
  agent: water_analyst_agent

finance_navigator_task:
  description: >
    Provide expert financial and policy advice for the user's query: '{user_input}'.
    If they ask about subsidies, search for eligible schemes and provide step-by-step application instructions in Bengali.
    If they ask about credit readiness, analyze their farm diary status for user: '{user_id}'.
    If they ask about insurance, provide a quote based on their crop and land size.
    Always respond in a helpful, professional Bengali tone.
  expected_output: >
    A detailed guide in Bengali explaining how to apply for specific subsidies, or a credit report with a 0-100 score, or a personalized insurance quote.
  agent: finance_advisor_agent

community_qa_task:
  description: >
    The user is asking a question to the community: '{user_input}'.
    First, use your Community Search tool to find similar past questions and answers.
    If a good answer exists, summarize it in Bengali and provide it to the user.
    If no good answer exists, state that you will escalate it to an expert and use the Escalate tool (use a mock question_id like 'q_123' if needed, and location '{gps}').
  expected_output: >
    A Bengali response summarizing past community answers or confirming that the question has been escalated to a local expert.
  agent: community_connector_agent

marketplace_task:
  description: >
    The user wants to find or verify agricultural inputs.
    Input: '{user_input}'
    Location: '{gps}'
    Image: '{image_path}'
    If they are looking for a product (e.g. 'urea fertilizer'), use the Dealer Search Tool.
    If they provided a barcode or image of a barcode, use the Product Verification Tool.
    If they uploaded a photo of a label to read the ingredients, use the Label Scanner Tool.
  expected_output: >
    A Bengali response detailing nearby dealers, or the verification status (Green/Yellow/Red) of a product.
  agent: procurement_advisor_agent

emergency_task:
  description: >
    The user is reporting an agricultural emergency or damage: '{user_input}'.
    Location: '{gps}'
    Image: '{image_path}'
    First, use the Assess Crop Damage tool to get a percentage estimate from the image.
    Then, use the Generate Damage Report tool to compile everything into an official record.
    Finally, use the SMS Share tool to send a confirmation or share the report.
    If they just want to call the helpline, provide the number (e.g., 3331) and instructions.
  expected_output: >
    A supportive Bengali response confirming the damage report has been filed, along with the report ID and next steps.
  agent: emergency_response_agent

